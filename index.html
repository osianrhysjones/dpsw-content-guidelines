<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDPS Content Guidelines</title>
  <meta name="description" content="Content guidelines for the Centre for Digital Public Services">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #1d70b8;
      --sidebar-width: 280px;
      --base-font-size: 16px;
      --base-line-height: 1.6;
    }
    .sidebar {
      border-right: 1px solid #e8e8e8;
    }
    .app-name-link {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="app">Loading…</div>

  <script>
    window.$docsify = {
      name: 'CDPS Content Guidelines',
      repo: 'https://github.com/osianrhysjones/dpsw-content-guidelines',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: 'Search guidelines…',
        noData: 'No results found.',
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
      },
      copyCode: {
        buttonText : 'Copy',
        errorText  : 'Error',
        successText: 'Copied',
      },
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
